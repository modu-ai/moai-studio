name: Swift CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci-swift.yml'
      - '.github/actions/install-signing/**'
  pull_request:
    paths:
      - 'app/**'

# BUILD_CERTIFICATE_BASE64 Secret 가용 여부에 따라 UITest 경로를 분기합니다.
# Secret 없음 (fork PR 등): UITest skip + 안내 메시지 출력
# Secret 있음: composite action 으로 임시 키체인 구성 → signed UITest 실행
env:
  HAS_SIGNING: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}

concurrency:
  group: ci-swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      # --- xcframework 캐싱 (T-076) ---
      - name: Cache GhosttyKit
        uses: actions/cache@v4
        id: cache-ghostty
        with:
          path: app/Frameworks/GhosttyKit.xcframework
          key: ghostty-${{ runner.os }}-${{ hashFiles('vendor/ghostty/**') }}

      - name: Build GhosttyKit if not cached
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: ./scripts/build-ghostty-xcframework.sh
        # Metal Toolchain 미설치 환경에서 실패 가능 (C-4 carry-over)
        continue-on-error: true

      - name: Cache Rust xcframework
        uses: actions/cache@v4
        id: cache-rust-xc
        with:
          path: app/Frameworks/MoaiCore.xcframework
          key: rust-xc-${{ runner.os }}-${{ hashFiles('core/**/*.rs', 'core/**/Cargo.toml') }}

      - name: Build Rust xcframework if not cached
        if: steps.cache-rust-xc.outputs.cache-hit != 'true'
        run: ./scripts/build-rust-xcframework.sh

      # --- 유닛 테스트 (UITests 제외) ---
      - name: xcodebuild build-for-testing
        working-directory: app
        run: |
          xcodebuild \
            -project MoAIStudio.xcodeproj \
            -scheme MoAIStudio \
            -destination 'platform=macOS' \
            build-for-testing

      - name: xcodebuild test-without-building
        working-directory: app
        run: |
          xcodebuild \
            -project MoAIStudio.xcodeproj \
            -scheme MoAIStudio \
            -destination 'platform=macOS' \
            -skip-testing:MoAIStudioUITests \
            test-without-building

      # --- UITest: signed 경로 (BUILD_CERTIFICATE_BASE64 Secret 존재 시) ---
      - name: Install signing (if available)
        if: env.HAS_SIGNING == 'true'
        id: install-signing
        uses: ./.github/actions/install-signing
        with:
          certificate-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          team-id: ${{ secrets.APPLE_TEAM_ID }}

      - name: UITest (signed)
        if: env.HAS_SIGNING == 'true'
        working-directory: app
        run: |
          xcodebuild \
            -project MoAIStudio.xcodeproj \
            -scheme MoAIStudio \
            -destination 'platform=macOS' \
            -only-testing:MoAIStudioUITests \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.install-signing.outputs.keychain-path }}" \
            test

      # --- UITest: skip 경로 (Secret 미설정 시, fork PR 등) ---
      - name: UITest skip notice
        if: env.HAS_SIGNING != 'true'
        run: |
          echo "UITest skipped — signing secrets not configured."
          echo "See .github/SIGNING.md for setup instructions."
          echo "(Skipping MoAIStudioUITests — configure secrets per .github/SIGNING.md)"
